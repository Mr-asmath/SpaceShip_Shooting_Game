apiVersion: apps/v1
kind: Deployment
metadata:
  name: galaxy-defender
  labels:
    app: galaxy-defender
spec:
  replicas: 2
  selector:
    matchLabels:
      app: galaxy-defender
  template:
    metadata:
      labels:
        app: galaxy-defender
    spec:
      containers:
        - name: galaxy-defender
          image: galaxy-defender:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: galaxy-defender
  labels:
    app: galaxy-defender
spec:
  type: LoadBalancer
  selector:
    app: galaxy-defender
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: galaxy-defender
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: galaxy-defender
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
