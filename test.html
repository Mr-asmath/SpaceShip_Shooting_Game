<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HUD Play Button</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center,#07131f,#01060c 70%);
overflow:hidden;
font-family:Arial,sans-serif;
}

.stars{
position:absolute;
inset:0;
background-image:
radial-gradient(#ffffff 1px,transparent 1px);
background-size:60px 60px;
opacity:.25;
}

.play-button{
position:relative;
width:240px;
height:110px;
cursor:pointer;
border-radius:22px;
overflow:hidden;

background:
linear-gradient(
180deg,
rgba(120,255,220,.18),
rgba(0,255,180,.08)
);

box-shadow:
0 0 20px #65ffd3,
0 0 45px #65ffd3,
inset 0 0 25px rgba(120,255,220,.6);

transition:.3s;
}

/* SCAN EFFECT */

.play-button::before{
content:"";
position:absolute;
left:-100%;
top:0;
width:60%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.7),
transparent
);

animation:scan 2.5s linear infinite;
}

/* HUD LINES */

.play-button::after{
content:"";
position:absolute;
inset:0;

background:
repeating-linear-gradient(
180deg,
transparent 0px,
transparent 2px,
rgba(255,255,255,.04) 3px
);

pointer-events:none;
}

/* ENERGY EFFECT */

.energy{
position:absolute;
width:240px;
height:110px;
overflow:hidden;
pointer-events:none;
}

.energy::before{
content:"";
position:absolute;
left:-100%;
top:50%;
width:400px;
height:6px;

background:
linear-gradient(
90deg,
transparent,
#9ffff1,
white,
#9ffff1,
transparent
);

transform:translateY(-50%);
filter:blur(3px);

animation:wave 2s infinite;
}

/* PLAY ICON */

.play-icon{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#8effd6;

text-shadow:
0 0 10px #8effd6,
0 0 20px #8effd6,
0 0 40px #8effd6;

z-index:5;
transition:.3s;
}

.play-button:hover{
transform:scale(1.05);
}

.play-button:hover .play-icon{
transform:translate(-50%,-50%) scale(1.15);
}

/* PARTICLES */

.particles{
position:absolute;
width:100%;
height:100%;
pointer-events:none;
}

.particle{
position:absolute;
width:4px;
height:4px;
background:#8effd6;
border-radius:50%;

box-shadow:
0 0 10px #8effd6;

animation:float 3s linear infinite;
}

/* ANIMATIONS */

@keyframes scan{
0%{
left:-100%;
}
100%{
left:150%;
}
}

@keyframes wave{
0%{
left:-120%;
opacity:0;
}
50%{
opacity:1;
}
100%{
left:120%;
opacity:0;
}
}

@keyframes float{
0%{
transform:translateX(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateX(-50px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="play-button" id="playBtn">

<div class="energy"></div>

<div class="play-icon">▶</div>

<div class="particles" id="particles"></div>

</div>

<script>

const container=document.getElementById("particles");

function createParticle(){

const p=document.createElement("div");

p.className="particle";

p.style.left=(Math.random()*100)+"%";
p.style.top=(Math.random()*100)+"%";

p.style.animationDuration=
(2+Math.random()*3)+"s";

container.appendChild(p);

setTimeout(()=>{
p.remove();
},4000);

}

setInterval(createParticle,120);

document.getElementById("playBtn")
.addEventListener("click",()=>{

const icon=document.querySelector(".play-icon");

icon.style.transform=
"translate(-50%,-50%) scale(1.4)";

setTimeout(()=>{
icon.style.transform=
"translate(-50%,-50%) scale(1)";
},250);

});

</script>

</body>
</html>
