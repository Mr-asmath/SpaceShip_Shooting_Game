name: Deploy Galaxy Defender

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare static site
        run: |
          mkdir -p public
          cp index.html public/
          cp README.md public/
          cp -r src public/src
          cp -r design public/design
          if [ -d assets ]; then cp -r assets public/assets; fi
          touch public/.nojekyll

      - name: Deploy static site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
