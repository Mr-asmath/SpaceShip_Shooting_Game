name: Deploy Galaxy Defender

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Pull Git LFS assets
        run: |
          git lfs install
          git lfs pull

      - name: Prepare static site
        run: |
          mkdir -p public
          cp index.html public/
          cp README.md public/
          cp -r src public/src
          cp -r design public/design
          if [ -d assets ]; then cp -r assets public/assets; fi
          touch public/.nojekyll

      - name: Verify deployed media assets
        run: |
          if grep -R "version https://git-lfs.github.com/spec/v1" public/design/images/video public/design/images/3d-model; then
            echo "Git LFS pointer files were copied instead of real media assets."
            exit 1
          fi

      - name: Deploy static site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true

      - name: Show Pages URL
        run: |
          echo "### GitHub Pages URL" >> "$GITHUB_STEP_SUMMARY"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_STEP_SUMMARY"
